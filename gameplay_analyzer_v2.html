<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gameplay Analyzer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      margin-bottom: 40px;
      padding-bottom: 30px;
    }
    
    h1 {
      font-size: 32px;
      margin-bottom: 8px;
      color: #fff;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    
    .subtitle {
      color: #999;
      font-size: 14px;
      margin-top: 5px;
    }
    
    .upload-area {
      background: rgba(255, 255, 255, 0.03);
      border: 2px dashed rgba(0, 132, 255, 0.3);
      border-radius: 12px;
      padding: 60px 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 30px;
    }
    
    .upload-area:hover {
      border-color: rgba(0, 132, 255, 0.6);
      background: rgba(0, 132, 255, 0.05);
    }
    
    .upload-area.drag-over {
      border-color: rgba(0, 132, 255, 0.8);
      background: rgba(0, 132, 255, 0.1);
    }
    
    .upload-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .upload-text {
      font-size: 16px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 8px;
    }
    
    .upload-hint {
      font-size: 13px;
      color: #999;
    }
    
    input[type="file"] {
      display: none;
    }
    
    .game-select {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .game-btn {
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #999;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    
    .game-btn:hover {
      background: rgba(0, 132, 255, 0.15);
      border-color: rgba(0, 132, 255, 0.4);
      color: #0084ff;
    }
    
    .game-btn.active {
      background: rgba(0, 132, 255, 0.3);
      border-color: rgba(0, 132, 255, 0.8);
      color: #0084ff;
      font-weight: 600;
    }
    
    .analyses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    
    .analysis-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .analysis-card:hover {
      border-color: rgba(0, 132, 255, 0.5);
      background: rgba(0, 132, 255, 0.08);
      transform: translateY(-4px);
    }
    
    .analysis-card.selected {
      border-color: rgba(0, 132, 255, 0.8);
      background: rgba(0, 132, 255, 0.15);
    }
    
    .card-header {
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .card-game {
      font-size: 13px;
      color: #0084ff;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    
    .card-date {
      font-size: 12px;
      color: #666;
    }
    
    .card-body {
      padding: 16px;
    }
    
    .card-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(0, 132, 255, 0.2);
      color: #0084ff;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .card-status.analyzing {
      background: rgba(255, 204, 0, 0.2);
      color: #ffcc00;
    }
    
    .card-status.error {
      background: rgba(255, 68, 68, 0.2);
      color: #ff4444;
    }
    
    .card-preview {
      font-size: 13px;
      color: #aaa;
      line-height: 1.5;
    }
    
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0, 132, 255, 0.3);
      border-top-color: #0084ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .detail-view {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 30px;
      margin-top: 30px;
    }
    
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .detail-title {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
    }
    
    .detail-meta {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
    }
    
    .detail-actions {
      display: flex;
      gap: 10px;
    }
    
    .btn {
      padding: 8px 16px;
      background: rgba(0, 132, 255, 0.2);
      border: 1px solid rgba(0, 132, 255, 0.4);
      color: #0084ff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .btn:hover {
      background: rgba(0, 132, 255, 0.3);
      border-color: rgba(0, 132, 255, 0.7);
    }
    
    .btn.danger {
      background: rgba(255, 68, 68, 0.2);
      border-color: rgba(255, 68, 68, 0.4);
      color: #ff8888;
    }
    
    .btn.danger:hover {
      background: rgba(255, 68, 68, 0.3);
      border-color: rgba(255, 68, 68, 0.7);
    }
    
    .analysis-content {
      margin-top: 20px;
    }
    
    .analysis-section {
      margin-bottom: 20px;
    }
    
    .analysis-section h3 {
      font-size: 14px;
      color: #0084ff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      font-weight: 600;
    }
    
    .analysis-text {
      font-size: 14px;
      line-height: 1.6;
      color: #d0d0d0;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    
    .error-message {
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid rgba(255, 68, 68, 0.3);
      color: #ff9999;
      padding: 16px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }
    
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    .empty-state p {
      font-size: 14px;
    }
    
    .api-key-notice {
      background: rgba(0, 132, 255, 0.1);
      border-left: 3px solid rgba(0, 132, 255, 0.5);
      padding: 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 30px;
      color: #a0c0e0;
      line-height: 1.5;
    }
    
    .api-key-input-wrapper {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    
    .api-key-input {
      flex: 1;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
      border-radius: 6px;
      font-size: 13px;
      font-family: monospace;
    }
    
    .api-key-input:focus {
      outline: none;
      border-color: rgba(0, 132, 255, 0.5);
      background: rgba(0, 132, 255, 0.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Gameplay Analyzer</h1>
      <p class="subtitle">Upload your gameplay clip and get AI feedback on aim, sensitivity, and performance</p>
    </header>

    <div class="api-key-notice" id="apiKeyNotice">
      <strong>API Key Required:</strong> Paste your Claude API key below to get started. Get one at <a href="https://console.anthropic.com" target="_blank" style="color: #0084ff;">console.anthropic.com</a>
      <div class="api-key-input-wrapper">
        <input type="password" id="apiKeyInput" class="api-key-input" placeholder="sk-ant-...">
        <button class="btn" onclick="saveApiKey()" style="flex: 0 0 auto;">Save</button>
      </div>
    </div>

    <div class="game-select" id="gameSelect">
      <button class="game-btn active" onclick="selectGame(this, 'R6 Siege')">R6 Siege</button>
      <button class="game-btn" onclick="selectGame(this, 'Valorant')">Valorant</button>
      <button class="game-btn" onclick="selectGame(this, 'CS2')">Counter-Strike 2</button>
      <button class="game-btn" onclick="selectGame(this, 'Apex Legends')">Apex Legends</button>
      <button class="game-btn" onclick="selectGame(this, 'Overwatch 2')">Overwatch 2</button>
      <button class="game-btn" onclick="selectGame(this, 'Other')">Other Game</button>
    </div>

    <div class="upload-area" id="uploadArea" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📹</div>
      <div class="upload-text">Drop your clip here or click to browse</div>
      <div class="upload-hint">Supports MP4, WebM, MOV (2-5 min clips work best)</div>
      <input type="file" id="fileInput" accept="video/*" onchange="handleFileSelect(event)">
    </div>

    <div class="analyses-grid" id="analysesList"></div>
    <div id="selectedAnalysis"></div>
  </div>

  <script>
    let analyses = {};
    let currentGame = 'R6 Siege';
    let apiKey = localStorage.getItem('claudeApiKey');

    if (apiKey) {
      document.getElementById('apiKeyNotice').style.display = 'none';
      document.getElementById('apiKeyInput').value = apiKey.substring(0, 20) + '...';
    }

    function saveApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (!key) {
        alert('Please enter your API key');
        return;
      }
      localStorage.setItem('claudeApiKey', key);
      apiKey = key;
      document.getElementById('apiKeyNotice').style.display = 'none';
      alert('API key saved!');
    }

    function selectGame(btn, game) {
      document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentGame = game;
    }

    function handleDragOver(e) {
      e.preventDefault();
      document.getElementById('uploadArea').classList.add('drag-over');
    }

    function handleDragLeave(e) {
      e.preventDefault();
      document.getElementById('uploadArea').classList.remove('drag-over');
    }

    function handleDrop(e) {
      e.preventDefault();
      document.getElementById('uploadArea').classList.remove('drag-over');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        handleFileSelect({ target: { files: files } });
      }
    }

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (!file) return;

      if (!file.type.startsWith('video/')) {
        alert('Please select a video file');
        return;
      }

      const clipId = Date.now().toString();
      const fileSize = (file.size / (1024 * 1024)).toFixed(1);

      analyses[clipId] = {
        id: clipId,
        game: currentGame,
        filename: file.name,
        fileSize: fileSize,
        timestamp: new Date().toLocaleString(),
        status: 'analyzing',
        feedback: null,
        file: file
      };

      renderAnalyses();
      analyzeClip(clipId, file);
    }

    function renderAnalyses() {
      const list = document.getElementById('analysesList');
      const sorted = Object.values(analyses).sort((a, b) => b.id - a.id);

      if (sorted.length === 0) {
        list.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><div class="empty-state-icon">🎮</div><p>Upload a clip to get started</p></div>';
        return;
      }

      list.innerHTML = sorted.map(analysis => `
        <div class="analysis-card ${analysis.status === 'complete' ? '' : ''}" onclick="showAnalysis('${analysis.id}')">
          <div class="card-header">
            <div class="card-game">${analysis.game}</div>
            <div class="card-date">${analysis.timestamp}</div>
          </div>
          <div class="card-body">
            <div class="card-status ${analysis.status === 'analyzing' ? 'analyzing' : analysis.status === 'error' ? 'error' : ''}">
              ${analysis.status === 'analyzing' ? `<div class="spinner"></div>Analyzing...` : analysis.status === 'error' ? '⚠️ Error' : '✓ Ready'}
            </div>
            <div class="card-preview">
              ${analysis.status === 'analyzing' ? 'Claude is analyzing your clip...' : analysis.feedback ? analysis.feedback.substring(0, 80) + '...' : 'Processing...'}
            </div>
          </div>
        </div>
      `).join('');
    }

    async function analyzeClip(clipId, file) {
      try {
        if (!apiKey) {
          analyses[clipId].feedback = 'Error: API key not set. Please add your Claude API key above.';
          analyses[clipId].status = 'error';
          renderAnalyses();
          return;
        }

        const reader = new FileReader();
        reader.onload = async () => {
          const base64 = reader.result.split(',')[1];

          const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': apiKey
            },
            body: JSON.stringify({
              model: 'claude-sonnet-4-20250514',
              max_tokens: 1500,
              messages: [
                {
                  role: 'user',
                  content: [
                    {
                      type: 'text',
                      text: `You are a professional esports aim coach. Analyze this ${analyses[clipId].game} gameplay clip and provide concise, actionable feedback. Focus on:\n\n1. AIM ACCURACY - Specific moments of over/under aiming\n2. SENSITIVITY - Is it too high or too low based on flick patterns?\n3. CROSSHAIR PLACEMENT - Pre-aiming and positioning\n4. MOVEMENT - Peeking, positioning, angles\n5. TOP 3 IMPROVEMENTS - Concrete tips to level up\n\nBe direct and specific. Use exact examples from the video.`
                    },
                    {
                      type: 'image',
                      source: {
                        type: 'base64',
                        media_type: 'video/webm',
                        data: base64
                      }
                    }
                  ]
                }
              ]
            })
          });

          const data = await response.json();

          if (response.ok && data.content && data.content[0]) {
            analyses[clipId].feedback = data.content[0].text;
            analyses[clipId].status = 'complete';
          } else {
            const errorMsg = data.error?.message || 'Unknown error';
            analyses[clipId].feedback = `Error: ${errorMsg}`;
            analyses[clipId].status = 'error';
          }

          renderAnalyses();
        };

        reader.readAsDataURL(file);
      } catch (error) {
        analyses[clipId].feedback = `Error: ${error.message}`;
        analyses[clipId].status = 'error';
        renderAnalyses();
      }
    }

    function showAnalysis(clipId) {
      const analysis = analyses[clipId];
      const detail = document.getElementById('selectedAnalysis');

      detail.innerHTML = `
        <div class="detail-view">
          <div class="detail-header">
            <div>
              <div class="detail-title">${analysis.game}</div>
              <div class="detail-meta">${analysis.timestamp} • ${analysis.fileSize}MB</div>
            </div>
            <div class="detail-actions">
              <button class="btn" onclick="copyAnalysis('${clipId}')">Copy</button>
              <button class="btn danger" onclick="deleteAnalysis('${clipId}')">Delete</button>
            </div>
          </div>
          
          <div class="analysis-content">
            ${analysis.status === 'analyzing' ? `
              <div style="display: flex; align-items: center; gap: 12px; color: #666;">
                <div class="spinner"></div>
                Claude is analyzing your clip...
              </div>
            ` : analysis.status === 'error' ? `
              <div class="error-message">${analysis.feedback}</div>
            ` : `
              <div class="analysis-text">${analysis.feedback}</div>
            `}
          </div>
        </div>
      `;
    }

    function copyAnalysis(clipId) {
      const text = analyses[clipId].feedback;
      navigator.clipboard.writeText(text).then(() => {
        alert('Copied to clipboard!');
      });
    }

    function deleteAnalysis(clipId) {
      if (confirm('Delete this analysis?')) {
        delete analyses[clipId];
        renderAnalyses();
        document.getElementById('selectedAnalysis').innerHTML = '';
      }
    }

    renderAnalyses();
  </script>
</body>
</html>
